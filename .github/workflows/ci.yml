name: Mechanic Finder CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t keshavvx01/mechanic-finder:latest .

      - name: Push Docker Image
        run: docker push keshavvx01/mechanic-finder:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull keshavvx01/mechanic-finder:latest

            docker stop mechanic-finder || true
            docker rm mechanic-finder || true

            docker run -d \
              --name mechanic-finder \
              --restart unless-stopped \
              -p 3001:3001 \
              keshavvx01/mechanic-finder:latest
